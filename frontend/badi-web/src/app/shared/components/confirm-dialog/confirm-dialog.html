<div class="confirm-dialog">
  <!-- Header -->
  <div class="confirm-dialog-header" [ngClass]="{'header-warn': data.confirmColor === 'warn'}">
    <div class="header-icon-area">
      <mat-icon class="header-icon" [ngClass]="{'icon-warn': data.confirmColor === 'warn', 'icon-primary': data.confirmColor !== 'warn'}">
        {{ data.confirmColor === 'warn' ? 'warning_amber' : 'help_outline' }}
      </mat-icon>
    </div>
    <h2 mat-dialog-title>{{ data.title }}</h2>
  </div>

  <!-- Content -->
  <mat-dialog-content class="confirm-dialog-content">
    <p class="confirm-message">{{ data.message }}</p>
    <p class="confirm-secondary" *ngIf="data.secondaryText">{{ data.secondaryText }}</p>
  </mat-dialog-content>

  <!-- Actions -->
  <mat-dialog-actions class="confirm-dialog-actions">
    <button mat-stroked-button class="badi-btn-cancel" (click)="onCancel()">{{ data.cancelText || 'Cancelar' }}</button>
    <button mat-flat-button
            [ngClass]="data.confirmColor === 'warn' ? 'badi-btn-danger' : 'badi-btn-primary'"
            (click)="onConfirm()">
      {{ data.confirmText }}
    </button>
  </mat-dialog-actions>
</div>
