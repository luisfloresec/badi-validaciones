<div class="login-split">

  <!-- ═══ PANEL IZQUIERDO — Branding ═══ -->
  <div class="login-brand">
    <div class="brand-content">
      <img src="assets/logo-badi.png" alt="Logo BADI" class="brand-logo" />
      <h1 class="brand-title">Bienvenido</h1>
      <p class="brand-description">
        Sistema de Gestión Social del Banco de Alimentos Imbabura.
      </p>
    </div>
    <div class="brand-footer">
      <span>© 2026 Banco de Alimentos Imbabura - BADI.</span>
      <span>Sistema desarrollado por Luis Flores.</span>
    </div>
  </div>

  <!-- ═══ PANEL DERECHO — Formulario (Estilo BADI Original) ═══ -->
  <div class="login-form-panel">
    <div class="form-wrapper badi-style-card">

      <!-- Encabezado BADI -->
      <div class="badi-header">
        <img src="assets/logo-badi.png" alt="Logo BADI" class="badi-header-logo" />
        <p>Sistema de Gestión Social</p>
      </div>

      <!-- Error -->
      <div *ngIf="errorMessage" class="custom-error-box">
        <i class="pi pi-exclamation-circle error-icon"></i>
        <span class="error-text">{{ errorMessage }}</span>
      </div>

      <form (ngSubmit)="onSubmit()" class="login-form" autocomplete="on">

        <!-- Email -->
        <div class="badi-field">
          <i class="pi pi-envelope field-icon"></i>
          <input
            pInputText
            id="login-email"
            type="email"
            [(ngModel)]="email"
            name="email"
            placeholder="Correo electrónico*"
            required
            autocomplete="email"
            class="badi-input"
          />
        </div>

        <!-- Password -->
        <div class="badi-field">
          <i class="pi pi-lock field-icon"></i>
          <p-password
            id="login-password"
            [(ngModel)]="password"
            name="password"
            placeholder="Contraseña*"
            [toggleMask]="true"
            [feedback]="false"
            styleClass="badi-password-wrapper"
            inputStyleClass="badi-input"
            autocomplete="current-password"
          />
        </div>

        <!-- Submit -->
        <button
          pButton
          type="submit"
          class="badi-submit-btn"
          [disabled]="isLoading"
        >
          <i *ngIf="isLoading" class="pi pi-spin pi-spinner mr-2"></i>
          <span>Iniciar sesión</span>
        </button>

        <!-- Forgot password info -->
        <div class="badi-forgot-link-wrapper" style="text-align: center; margin-top: 1.5rem;">
          <a routerLink="/forgot-password" class="badi-forgot-link" style="color: #015641; font-weight: 600; text-decoration: underline; font-size: 14px;">
            ¿Olvidaste tu contraseña?
          </a>
        </div>
      </form>

      <div class="badi-form-footer">
        Banco de Alimentos Imbabura
      </div>
    </div>
  </div>
</div>
