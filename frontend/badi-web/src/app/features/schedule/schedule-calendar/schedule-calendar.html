<div class="page-container">
  <!-- Header -->
  <div class="page-header">
    <div class="header-content">
      <h1>Cronogramas</h1>
      <p class="subtitle">Planificación de entregas y retiros asociados a convenios activos.</p>
    </div>
    <div class="header-actions">
      <button mat-flat-button class="btn-primary" (click)="openScheduleForm()">
        <mat-icon>add</mat-icon> Programar entrega
      </button>
    </div>
  </div>

  <!-- Stats Cards -->
  <div class="stats-grid">
    <div class="stat-card" *ngIf="statsLoading">
      <mat-spinner diameter="24"></mat-spinner>
    </div>
    <ng-container *ngIf="!statsLoading">
      <div class="stat-card" *ngFor="let card of statCards">
        <div class="stat-icon-wrapper" [style.background]="card.bgColor">
          <mat-icon [style.color]="card.color">{{ card.icon }}</mat-icon>
        </div>
        <div class="stat-info">
          <span class="stat-value">{{ card.value }}</span>
          <span class="stat-label">{{ card.label }}</span>
        </div>
      </div>
    </ng-container>
  </div>

  <!-- Filtros y Calendario -->
  <div class="badi-card calendar-card">
    <div class="calendar-toolbar">
      <div class="toolbar-legend">
        <div class="legend-item"><span class="legend-dot status-programado"></span> Programado</div>
        <div class="legend-item"><span class="legend-dot status-reprogramado"></span> Reprogramado</div>
        <div class="legend-item"><span class="legend-dot status-cancelado"></span> Cancelado</div>
      </div>
      <div class="toolbar-indicator" *ngIf="eventsLoading">
        <mat-spinner diameter="20"></mat-spinner>
        <span>Cargando eventos...</span>
      </div>
    </div>

    <div class="calendar-wrapper">
      <full-calendar #calendar [options]="calendarOptions"></full-calendar>
    </div>
  </div>
</div>
