services:
  postgres:
    image: postgres:16
    container_name: badi_postgres
    restart: always
    environment:
      POSTGRES_DB: badi_db
      POSTGRES_USER: badi_user
      POSTGRES_PASSWORD: badi_password
    ports:
      - "5432:5432"
    volumes:
      - badi_postgres_data:/var/lib/postgresql/data

volumes:
  badi_postgres_data:
