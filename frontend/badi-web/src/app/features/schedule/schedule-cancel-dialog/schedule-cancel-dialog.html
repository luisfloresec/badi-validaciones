<div class="dialog-container">
  <div class="dialog-header">
    <div class="header-title">
      <mat-icon>event_busy</mat-icon>
      <h2>Cancelar entrega programada</h2>
    </div>
    <button mat-icon-button class="close-button" mat-dialog-close>
      <mat-icon>close</mat-icon>
    </button>
  </div>

  <div class="dialog-warning-banner">
    <mat-icon>warning</mat-icon>
    <span>Esta acción marcará la entrega como <strong>Cancelada</strong>. No se eliminará del sistema, pero quedará como histórica y no podrá revertirse.</span>
  </div>

  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    <div class="dialog-body" mat-dialog-content>
      <mat-form-field appearance="outline" class="full-field">
        <mat-label>Motivo de cancelación</mat-label>
        <textarea matInput formControlName="motivoCancelacion" rows="3" placeholder="Ej: La organización solicitó postergar indefinidamente la entrega"></textarea>
        <mat-error *ngIf="form.get('motivoCancelacion')?.hasError('required')">El motivo es obligatorio</mat-error>
        <mat-error *ngIf="form.get('motivoCancelacion')?.hasError('minlength')">Mínimo 5 caracteres</mat-error>
      </mat-form-field>
    </div>

    <div class="dialog-actions" mat-dialog-actions>
      <button mat-stroked-button type="button" mat-dialog-close [disabled]="isLoading">Volver</button>
      <button mat-flat-button type="submit" class="btn-cancel-action" [disabled]="form.invalid || isLoading">
        <mat-spinner *ngIf="isLoading" diameter="18" class="btn-spinner"></mat-spinner>
        <span *ngIf="!isLoading">Confirmar cancelación</span>
      </button>
    </div>
  </form>
</div>
